        <h1>SIMCII — Plataforma de monitoreo ambiental, social y territorial</h1>
        <p>SIMCII integra el monitoreo ambiental, social y territorial en una sola plataforma online. Mide, lee y anticipa el territorio con evidencia.</p>
        <h2>Qué hace SIMCII</h2>
        <ul>
          <li>Monitoreo medioambiental: estaciones, parámetros y KPIs medioambientales con score 0–100.</li>
          <li>Gestión social y comunitaria: actores, compromisos medioambientales y alertas territoriales.</li>
          <li>Contexto y regulación medioambiental: señales del entorno y cumplimiento (RCA).</li>
          <li>Sostenibilidad y licencia social para la operación, con datos comparables por territorio.</li>
        </ul>
        <h2>Para quién</h2>
        <p>Minería, energía y renovables, infraestructura, forestal, sector público y consultoría.</p>
        <p><a href="mailto:contacto@accionet.net" style="color:#5C82A0;">Solicitar una demo</a> · Santiago, Chile · por Accionet.</p>
